<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Xác thực mã OTP</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#156bc1",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<div class="max-w-md w-full bg-white dark:bg-slate-900 shadow-xl rounded-xl p-8 border border-primary/10">
<!-- Icon/Header Section -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-full mb-4">
<span class="material-icons text-primary text-3xl">lock_person</span>
</div>
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Xác thực OTP</h1>
<p class="mt-3 text-slate-600 dark:text-slate-400">
                Mã OTP đã được gửi đến số <span class="font-semibold text-slate-900 dark:text-slate-100">091****888</span>
</p>
</div>
<!-- OTP Input Section -->
<form action="#" class="space-y-8" method="POST">
<div class="flex justify-between gap-2 sm:gap-4">
<input class="w-12 h-14 text-center text-2xl font-bold bg-background-light dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:ring-0 rounded-lg text-slate-900 dark:text-slate-100 transition-all" maxlength="1" type="text" value="5"/>
<input class="w-12 h-14 text-center text-2xl font-bold bg-background-light dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:ring-0 rounded-lg text-slate-900 dark:text-slate-100 transition-all" maxlength="1" type="text" value="2"/>
<input class="w-12 h-14 text-center text-2xl font-bold bg-background-light dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:ring-0 rounded-lg text-slate-900 dark:text-slate-100 transition-all" maxlength="1" placeholder="·" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-bold bg-background-light dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:ring-0 rounded-lg text-slate-900 dark:text-slate-100 transition-all" maxlength="1" placeholder="·" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-bold bg-background-light dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:ring-0 rounded-lg text-slate-900 dark:text-slate-100 transition-all" maxlength="1" placeholder="·" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-bold bg-background-light dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:ring-0 rounded-lg text-slate-900 dark:text-slate-100 transition-all" maxlength="1" placeholder="·" type="text"/>
</div>
<!-- Countdown Timer -->
<div class="text-center space-y-2">
<div class="flex items-center justify-center text-slate-500 dark:text-slate-400 text-sm">
<span class="material-icons text-sm mr-1">schedule</span>
<span>Mã hết hạn sau: </span>
<span class="ml-1 font-mono font-medium text-primary">01:54</span>
</div>
<div>
<button class="text-sm font-medium text-slate-400 dark:text-slate-600 cursor-not-allowed transition-colors" disabled="" type="button">
                        Gửi lại mã
                    </button>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all transform active:scale-[0.98]" type="submit">
                Tiếp tục
            </button>
</form>
<!-- Help Link -->
<div class="mt-8 text-center">
<a class="text-sm text-slate-500 hover:text-primary transition-colors" href="#">
                Bạn gặp sự cố? Liên hệ hỗ trợ
            </a>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 -z-10 w-full h-full overflow-hidden opacity-50 pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl"></div>
</div>
</body></html>
