<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#156bc1",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Cấu hình Mã Y Tế</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-2xl mx-auto bg-white dark:bg-slate-900 min-h-screen shadow-sm flex flex-col">
<header class="flex items-center p-4 border-b border-slate-200 dark:border-slate-800 sticky top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-10">
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined block text-slate-700 dark:text-slate-300">arrow_back</span>
</button>
<h1 class="text-lg font-bold ml-2">Cấu hình Mã Y Tế</h1>
</header>
<main class="flex-1 overflow-y-auto pb-24">
<!-- Xem trước mã mẫu Section -->
<section class="p-4">
<h3 class="text-base font-bold mb-4">Xem trước mã mẫu</h3>
<div class="p-6 rounded-xl border-2 border-dashed border-primary/30 bg-primary/5 flex flex-col items-center justify-center gap-3">
<div class="w-16 h-16 bg-white dark:bg-slate-800 rounded-lg shadow-sm flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">qr_code_2</span>
</div>
<div class="text-center">
<p class="text-2xl font-mono font-bold text-primary tracking-wider">PHR-8492-X</p>
<p class="text-xs text-slate-500 mt-1 uppercase tracking-tight">Ví dụ định dạng mã hệ thống</p>
</div>
</div>
</section>
<!-- Thông số kỹ thuật Section -->
<section class="p-4 space-y-4">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary">settings_input_component</span>
<h3 class="text-base font-bold">Thông số kỹ thuật</h3>
</div>
<div class="space-y-4 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Tiền tố (Prefix)</label>
<input class="w-full rounded-lg border-slate-300 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary" placeholder="VD: PHR" type="text" value="PHR"/>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Độ dài mã (ký tự)</label>
<input class="w-full rounded-lg border-slate-300 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary" type="number" value="12"/>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Thuật toán kiểm tra</label>
<select class="w-full rounded-lg border-slate-300 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary">
<option selected="">Luhn Algorithm</option>
<option>Verhoeff Algorithm</option>
<option>ISO/IEC 7064</option>
</select>
</div>
</div>
</section>
<!-- Chính sách bảo mật Section -->
<section class="p-4 space-y-4">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary">security</span>
<h3 class="text-base font-bold">Chính sách bảo mật</h3>
</div>
<div class="space-y-4 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Chính sách hết hạn (ngày)</label>
<input class="w-full rounded-lg border-slate-300 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary" type="number" value="90"/>
</div>
<div class="flex items-center justify-between py-2">
<div>
<p class="text-sm font-medium text-slate-700 dark:text-slate-300">Xác thực OTP khi tra cứu</p>
<p class="text-xs text-slate-500">Yêu cầu mã OTP gửi đến SĐT bệnh nhân</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</div>
</section>
<div class="p-4 mt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                    Lưu cấu hình
                </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 max-w-2xl mx-auto border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md px-4 pb-4 pt-2">
<div class="flex justify-around items-center">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">settings</span>
<span class="text-[10px] font-medium">Cấu hình</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-[10px] font-medium">Thống kê</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Tài khoản</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">tune</span>
<span class="text-[10px] font-medium">Cài đặt</span>
</a>
</div>
</nav>
</div>
</body></html>
